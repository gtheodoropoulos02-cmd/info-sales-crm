<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0d14;--bg2:#111622;--bg3:#171e2e;--bg4:#1e2740;
  --accent:#4f8ef7;--accent2:#7c3aed;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
  --text:#e8ecf4;--text2:#8b95aa;--text3:#4a5568;
  --border:#1e2740;--border2:#2a3a5c;
  --radius:12px;--radius2:8px;
  font-family:'Plus Jakarta Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh}

/* ── Login ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 60% 0%,rgba(79,142,247,.12) 0%,transparent 60%),radial-gradient(ellipse at 10% 80%,rgba(124,58,237,.08) 0%,transparent 50%)}
.login-card{width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:16px;box-shadow:0 8px 32px rgba(79,142,247,.3)}
.login-logo h1{font-size:24px;font-weight:800;letter-spacing:-.5px}
.login-logo p{font-size:13px;color:var(--text3);margin-top:4px}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.login-box label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.login-box input{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:.2s;margin-bottom:16px}
.login-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.12)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:4px}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;display:none}

/* ── App Shell ── */
#app{display:none;height:100vh;overflow:hidden;flex-direction:row}
#app.visible{display:flex}

/* ── Sidebar ── */
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.sidebar-logo-text{font-size:15px;font-weight:800;letter-spacing:-.3px}
.sidebar-logo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sidebar-nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:8px 12px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius2);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:.15s;font-family:inherit}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(79,142,247,.15);color:var(--accent)}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.sidebar-user{padding:12px;border-top:1px solid var(--border)}
.user-card{background:var(--bg3);border-radius:var(--radius2);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.user-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--text3)}
.logout-btn{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:8px;border-radius:var(--radius2);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:.15s}
.logout-btn:hover{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:var(--red)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── Components ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius2);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#3d7ef5}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--bg4);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-success{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 9px;font-size:11.5px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700}
.card-body{padding:20px}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.08}
.stat-card.blue::after{background:var(--accent)}.stat-card.green::after{background:var(--green)}.stat-card.yellow::after{background:var(--yellow)}.stat-card.red::after{background:var(--red)}
.stat-label{font-size:11.5px;color:var(--text2);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-size:30px;font-weight:800;line-height:1;letter-spacing:-1px}
.stat-icon{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.stat-icon.blue{background:rgba(79,142,247,.15);color:var(--accent)}.stat-icon.green{background:rgba(34,197,94,.15);color:var(--green)}.stat-icon.yellow{background:rgba(245,158,11,.15);color:var(--yellow)}.stat-icon.red{background:rgba(239,68,68,.15);color:var(--red)}

.welcome-banner{background:linear-gradient(135deg,rgba(79,142,247,.12),rgba(124,58,237,.12));border:1px solid rgba(79,142,247,.2);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px}
.welcome-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.welcome-text h2{font-size:18px;font-weight:800;letter-spacing:-.3px}
.welcome-text p{font-size:13px;color:var(--text2);margin-top:2px}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:10px 16px;border-bottom:1px solid var(--border)}
td{padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015);cursor:default}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.badge-blue{background:rgba(79,142,247,.15);color:#7ab3fa}.badge-blue::before{background:#4f8ef7}
.badge-green{background:rgba(34,197,94,.15);color:#4ade80}.badge-green::before{background:#22c55e}
.badge-yellow{background:rgba(245,158,11,.15);color:#fbbf24}.badge-yellow::before{background:#f59e0b}
.badge-red{background:rgba(239,68,68,.15);color:#f87171}.badge-red::before{background:#ef4444}
.badge-gray{background:rgba(255,255,255,.07);color:var(--text2)}.badge-gray::before{background:var(--text3)}

.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
label{display:block;font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.req{color:var(--red);margin-left:2px}
input[type=text],input[type=email],input[type=date],input[type=password],select,textarea{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--radius2);padding:9px 12px;font-size:13.5px;color:var(--text);font-family:inherit;outline:none;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.1)}
textarea{resize:vertical;min-height:80px}
input::placeholder{color:var(--text3)}
select{cursor:pointer}

.step-wizard{display:flex;align-items:center;margin-bottom:28px}
.step{display:flex;align-items:center;gap:8px}
.step-num{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0;transition:.3s}
.step.done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step.active .step-num{background:var(--accent);border-color:var(--accent);color:#fff}
.step-label{font-size:12px;font-weight:600;color:var(--text3)}
.step.active .step-label{color:var(--accent)}.step.done .step-label{color:var(--green)}
.step-line{flex:1;height:2px;background:var(--border2);margin:0 8px;transition:.3s}
.step-line.done{background:var(--green)}

.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg3);position:relative}
.upload-zone:hover{border-color:var(--accent);background:rgba(79,142,247,.05)}
.upload-zone.uploaded{border-color:var(--green);background:rgba(34,197,94,.05)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

.inline-tag{display:inline-flex;background:rgba(79,142,247,.12);color:#7ab3fa;padding:2px 8px;border-radius:4px;font-size:11.5px;font-weight:600}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--radius2);padding:8px 12px}
.search-bar input{background:none;border:none;outline:none;font-size:13px;font-family:inherit;flex:1;color:var(--text)}
.search-bar svg{color:var(--text3);width:14px;height:14px;flex-shrink:0}

.tag-manager{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--radius2);min-height:46px}
.tag{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border2);padding:4px 10px;border-radius:20px;font-size:12px;color:var(--text2)}
.tag-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;line-height:1;font-weight:700}
.add-tag-row{display:flex;gap:8px;margin-top:8px}
.add-tag-row input{flex:1}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;border-radius:18px 18px 0 0}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;line-height:1;transition:.15s;padding:2px 6px;border-radius:6px}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--bg2);border-radius:0 0 18px 18px}

.detail-section{margin-bottom:20px}
.detail-section-title{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.detail-row{display:flex;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:12px;color:var(--text3);width:170px;flex-shrink:0;font-weight:500}
.detail-val{font-size:12px;color:var(--text);font-weight:600}

.doc-grid{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
.doc-thumb-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.doc-thumb{width:100px;height:80px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border2);cursor:pointer;transition:.2s}
.doc-thumb:hover{border-color:var(--accent);transform:scale(1.04)}
.doc-missing{width:100px;height:80px;border-radius:8px;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);text-align:center;padding:8px}
.doc-label{font-size:10.5px;color:var(--text3);text-align:center;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.alert{border-radius:var(--radius2);padding:10px 14px;font-size:13px;margin-bottom:16px}
.alert-info{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.25);color:#7ab3fa}
.alert-warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24}

.notif{position:fixed;top:18px;right:18px;z-index:999;padding:12px 20px;border-radius:var(--radius2);font-size:13.5px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.5);display:none;animation:slideIn .3s ease}
.notif-ok{background:var(--green);color:#fff}.notif-err{background:var(--red);color:#fff}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;display:none;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
.lightbox-close{position:fixed;top:16px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:28px;cursor:pointer;border-radius:8px;padding:4px 12px;line-height:1}

.info-company{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.company-header{padding:14px 18px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.company-name{font-size:14px;font-weight:700}
.company-body{padding:18px}
.plan-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);padding:14px 16px;margin-bottom:10px}
.plan-name{font-size:13.5px;font-weight:700;margin-bottom:4px}
.plan-price{font-size:20px;font-weight:800;color:var(--accent);margin-bottom:6px;letter-spacing:-.5px}
.plan-doc-item{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:12px;color:var(--text2)}
.plan-doc-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--text3);flex-shrink:0}
.req-doc{color:var(--accent);font-weight:600}

.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.page{display:none}.page.active{display:block}
</style>
</head>
<body>

<div id="notif" class="notif"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">×</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">S</div>
      <h1>Sales CRM</h1>
      <p>Partner Management Portal</p>
    </div>
    <div class="login-box">
      <div class="login-err" id="login-err"></div>
      <label>Email</label>
      <input type="email" id="login-email" placeholder="email@example.com" autocomplete="email">
      <label>Κωδικός</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()" id="login-btn">Σύνδεση →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">S</div>
      <div>
        <div class="sidebar-logo-text">Sales CRM</div>
        <div class="sidebar-logo-sub" id="sidebar-sub">Partner Portal</div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-user">
      <div class="user-card">
        <div class="user-av" id="user-av">?</div>
        <div>
          <div class="user-name" id="user-name-disp">—</div>
          <div class="user-role" id="user-role-disp">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">⎋ Αποσύνδεση</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
    </div>
    <div class="content" id="page-content"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="maybeCloseModal(event)">
  <div class="modal" id="modal-box"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDemC6fEyDKzgg9SNZFYbTT7NFYQ8As58Y",
  authDomain: "sales-crm-9043a.firebaseapp.com",
  projectId: "sales-crm-9043a",
  storageBucket: "sales-crm-9043a.firebasestorage.app",
  messagingSenderId: "642783743587",
  appId: "1:642783743587:web:6f23cc0dc5226caacff256",
  measurementId: "G-9NHHYNC82C"
};

const fireApp = initializeApp(firebaseConfig);
const auth    = getAuth(fireApp);
const db      = getFirestore(fireApp);

// ── Globals ──
let CURRENT_USER = null;
let CURRENT_ROLE = null;
let NEW_APP_DRAFT = {};
let NEW_APP_STEP = 1;
let CACHE = { categories:[], providers:{}, products:{}, statuses:[], partners:[], applications:[], infoCompanies:[] };

// ── Helpers ──
function esc(s){ const d=document.createElement('div'); d.textContent=String(s??''); return d.innerHTML; }
function showNotif(msg, ok=true){
  const n=document.getElementById('notif');
  n.textContent=msg; n.className='notif '+(ok?'notif-ok':'notif-err');
  n.style.display='block'; setTimeout(()=>n.style.display='none', 3000);
}
function openLightbox(src){ document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('open'); }
window.closeLightbox=()=>{ document.getElementById('lightbox').classList.remove('open'); document.getElementById('lightbox-img').src=''; };
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeLightbox(); closeModal(); } });

function getInitials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(); }

function badgeClass(color){

}
function badge(name,color){ return `<span class="badge ${badgeClass(color)}">${esc(name)}</span>`; }

// ── Auth ──
window.doLogin = async function(){
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');
  err.style.display='none';
  if(!email||!pass){ err.textContent='Συμπληρώστε email και κωδικό.'; err.style.display='block'; return; }
  btn.innerHTML='<span class="spinner"></span>';
  btn.disabled=true;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.textContent='Λανθασμένα στοιχεία σύνδεσης.';
    err.style.display='block';
    btn.innerHTML='Σύνδεση →'; btn.disabled=false;
  }
};

window.doLogout = async function(){
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if(user){
    CURRENT_USER = user;
    // Get role from Firestore
    const snap = await getDoc(doc(db,'users',user.uid));
    const data = snap.exists() ? snap.data() : {};
    CURRENT_ROLE = data.role || 'partner';
    const name = data.name || user.email;
    document.getElementById('user-av').textContent = getInitials(name);
    document.getElementById('user-name-disp').textContent = name;
    document.getElementById('user-role-disp').textContent = CURRENT_ROLE==='admin'?'Διαχειριστής':'Εξωτερικός Πωλητής';
    document.getElementById('sidebar-sub').textContent = CURRENT_ROLE==='admin'?'Admin Panel':'Partner Portal';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    buildNav();
    navigate('dashboard');
  } else {
    CURRENT_USER=null; CURRENT_ROLE=null;
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').classList.remove('visible');
    const btn=document.getElementById('login-btn');
    btn.innerHTML='Σύνδεση →'; btn.disabled=false;
  }
});

// ── Firestore helpers ──
async function loadStatuses(){ if(CACHE.statuses.length) return CACHE.statuses; const s=await getDocs(collection(db,"statuses")); CACHE.statuses=s.docs.map(d=>({id:d.id,...d.data()})); return CACHE.statuses; }
async function loadCategories(){ const s=await getDocs(collection(db,'categories')); CACHE.categories=s.docs.map(d=>({id:d.id,...d.data()})); return CACHE.categories; }
async function loadPartners(){ const s=await getDocs(query(collection(db,'users'),where('role','==','partner'))); CACHE.partners=s.docs.map(d=>({id:d.id,...d.data()})); return CACHE.partners; }
async function loadProviders(catId){ const s=await getDocs(query(collection(db,'providers'),where('categoryId','==',catId))); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function loadProducts(provId){ const s=await getDocs(query(collection(db,'products'),where('providerId','==',provId))); return s.docs.map(d=>({id:d.id,...d.data()})); }

async function loadApplications(force=false){
  if(!force && CACHE.applications.length) return CACHE.applications;
  try {
    let q;
    if(CURRENT_ROLE==='admin') q=collection(db,'applications');
    else q=query(collection(db,'applications'),where('partnerId','==',CURRENT_USER.uid));
    const s=await getDocs(q);
    CACHE.applications=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
      const ta=a.createdAt?.seconds||0,tb=b.createdAt?.seconds||0; return tb-ta;
    });
  } catch(e){ console.error(e); CACHE.applications=[]; }
  return CACHE.applications;
}

async function loadInfoCompanies(force=false){
  if(!force && CACHE.infoCompanies.length) return CACHE.infoCompanies;
  const s=await getDocs(collection(db,'infoCompanies'));
  const companies=s.docs.map(d=>({id:d.id,...d.data(),plans:[]}));
  await Promise.all(companies.map(async c=>{
    const ps=await getDocs(collection(db,'infoCompanies',c.id,'plans'));
    c.plans=ps.docs.map(d=>({id:d.id,...d.data()}));
  }));
  CACHE.infoCompanies=companies;
  return companies;
}

async function getStatusInfo(statusId){
  const s=await loadStatuses();
  return s.find(x=>x.id===statusId)||{name:'Άγνωστο',color:'gray'};
}

async function getPartnerName(uid){
  const p=CACHE.partners.find(x=>x.id===uid);
  if(p) return p.name;
  const snap=await getDoc(doc(db,'users',uid));
  return snap.exists()?snap.data().name:uid;
}

function genCode(){
  return 'APP'+Date.now().toString(36).toUpperCase().slice(-6);
}

function formatDate(ts){
  if(!ts) return '—';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString('el-GR');
}

// Convert file to compressed base64
function toBase64(file){ 
  return new Promise((res,rej)=>{
    if(file.type==='application/pdf'){
      const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file);
      return;
    }
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=800;
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(canvas.toDataURL('image/jpeg',0.7));
    };
    img.onerror=rej;
    img.src=url;
  });
}

window.handleDocUpload = async function(e, type){
  const files=Array.from(e.target.files);
  if(!files.length) return;
  const zone=document.getElementById('uz-'+type);
  const lbl=document.getElementById('ul-'+type);
  lbl.textContent='Επεξεργασία...';
  if(!NEW_APP_DRAFT.docs) NEW_APP_DRAFT.docs={};
  if(type==='extra'){
    if(!NEW_APP_DRAFT.docs.extra) NEW_APP_DRAFT.docs.extra=[];
    for(const f of files){
      const b64=await toBase64(f);
      NEW_APP_DRAFT.docs.extra.push({name:f.name,data:b64});
    }
    lbl.textContent=`✓ ${files.length} αρχείο(α)`;
  } else {
    const b64=await toBase64(files[0]);
    NEW_APP_DRAFT.docs[type]={name:files[0].name,data:b64};
    lbl.textContent='✓ '+files[0].name;
  }
  zone.classList.add('uploaded');
};

function renderAppRows(apps,stMap,pMap,statuses){
  if(!apps.length) return`<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:40px">Δεν βρέθηκαν αιτήσεις</td></tr>`;
  return apps.map(a=>{const st=stMap[a.statusId]||{name:'—',color:'gray'};return`<tr>
    <td><span class="inline-tag">${esc(a.code)}</span></td>
    <td>${esc(pMap[a.partnerId]||a.partnerId)}</td>
    <td style="color:var(--text);font-weight:600">${esc(a.custFirstname)} ${esc(a.custLastname)}</td>
    <td>${esc(a.custAfm)}</td>
    <td>${esc(a.providerName)} · ${esc(a.productName)}</td>
    <td>${formatDate(a.createdAt)}</td>
    <td><select onchange="quickStatus('${a.id}',this.value)" style="background:var(--bg3);border:1.5px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);font-family:inherit;cursor:pointer;outline:none">
      ${statuses.map(s=>`<option value="${s.id}" ${s.id===a.statusId?'selected':''}>${esc(s.name)}</option>`).join('')}
    </select></td>
    <td><button class="btn btn-ghost btn-xs" onclick="viewApp('${a.id}')">${svgIcon('eye')} Προβολή</button></td>
  </tr>`;}).join('');
}

window.filterAllApps=function(){
  const q=(document.getElementById('search-q').value||'').toLowerCase();
  const st=document.getElementById('f-status').value;
  const pt=document.getElementById('f-partner').value;
  const {apps,stMap,pMap,statuses}=window._allAppsData||{apps:[],stMap:{},pMap:{},statuses:[]};
  let filtered=apps;
  if(q) filtered=filtered.filter(a=>((a.custFirstname||'')+' '+(a.custLastname||'')).toLowerCase().includes(q)||(a.custAfm||'').includes(q)||(a.code||'').toLowerCase().includes(q));
  if(st) filtered=filtered.filter(a=>a.statusId===st);
  if(pt) filtered=filtered.filter(a=>a.partnerId===pt);
  document.getElementById('all-apps-title').textContent=`Αιτήσεις (${filtered.length})`;
  document.getElementById('all-apps-tbody').innerHTML=renderAppRows(filtered,stMap,pMap,statuses);
};

window.quickStatus=async function(appId,statusId){
  await updateDoc(doc(db,'applications',appId),{statusId,updatedAt:serverTimestamp()});
  if(window._allAppsData){ const a=window._allAppsData.apps.find(x=>x.id===appId); if(a) a.statusId=statusId; }
  showNotif('Στάτους ενημερώθηκε');
};

// ── Partners (Admin) ──
async function renderPartners(c){
  const [partners,apps]=await Promise.all([loadPartners(),loadApplications()]);
  c.innerHTML=`
<div style="display:flex;justify-content:flex-end;margin-bottom:16px">
  <button class="btn btn-primary" onclick="openAddPartner()">+ Νέος Συνεργάτης</button>
</div>
<div class="card">
  <div class="card-header"><div class="card-title">Συνεργάτες (${partners.length})</div></div>
  <table><thead><tr><th>Όνομα</th><th>Email</th><th>Αιτήσεις</th><th>Κατάσταση</th><th></th></tr></thead>
  <tbody>${partners.map(p=>`<tr>
    <td style="color:var(--text);font-weight:700">${esc(p.name)}</td>
    <td>${esc(p.email)}</td>
    <td>${apps.filter(a=>a.partnerId===p.id).length}</td>
    <td><span class="badge ${p.active!==false?'badge-green':'badge-red'}">${p.active!==false?'Ενεργός':'Ανενεργός'}</span></td>
    <td><button class="btn btn-ghost btn-xs" onclick="togglePartner('${p.id}',${p.active!==false})">${p.active!==false?'Απενεργοποίηση':'Ενεργοποίηση'}</button></td>
  </tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:40px">Δεν υπάρχουν συνεργάτες</td></tr>'}
  </tbody></table>
</div>`;
}

window.openAddPartner=function(){
  showModal(`
<div class="modal-header"><div class="modal-title">Νέος Συνεργάτης</div><button class="modal-close" onclick="closeModal()">×</button></div>
<div class="modal-body">
  <div class="form-row"><div class="form-group"><label>Ονοματεπώνυμο <span class="req">*</span></label><input id="np-name" type="text"></div><div class="form-group"><label>Email <span class="req">*</span></label><input id="np-email" type="email"></div></div>
  <div class="form-group"><label>Κωδικός <span class="req">*</span></label><input id="np-pass" type="password" placeholder="Τουλάχιστον 6 χαρακτήρες"></div>
</div>
<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Ακύρωση</button><button class="btn btn-primary" onclick="addPartner()">Δημιουργία</button></div>`);
};

window.addPartner=async function(){
  const name=document.getElementById('np-name').value.trim();
  const email=document.getElementById('np-email').value.trim();
  const pass=document.getElementById('np-pass').value;
  if(!name||!email||!pass){ showNotif('Συμπληρώστε όλα τα πεδία',false); return; }
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,'users',cred.user.uid),{name,email,role:'partner',active:true,createdAt:serverTimestamp()});
    // Re-sign in as admin (Firebase logs you in as the new user)
    showNotif('Συνεργάτης δημιουργήθηκε! ⚠️ Έχετε αποσυνδεθεί - συνδεθείτε ξανά.',true);
    closeModal();
  } catch(e){ showNotif('Σφάλμα: '+e.message,false); }
};

window.togglePartner=async function(uid,currentActive){
  await updateDoc(doc(db,'users',uid),{active:!currentActive});
  showNotif('Κατάσταση ενημερώθηκε');
  renderPartners(document.getElementById('page-content'));
};

// ── Settings (Admin) ──
async function renderSettings(c){
  const [cats,statuses,companies]=await Promise.all([loadCategories(),loadStatuses(),loadInfoCompanies()]);
  c.innerHTML=`
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
  <div>
    <div class="card"><div class="card-header"><div class="card-title">Κατηγορίες</div></div><div class="card-body">
      <div class="tag-manager" id="cats-list">${cats.map(x=>`<div class="tag">${esc(x.name)}<button class="tag-del" onclick="deleteCat('${x.id}')">×</button></div>`).join('')}</div>
      <div class="add-tag-row"><input type="text" id="new-cat" placeholder="Νέα κατηγορία..."><button class="btn btn-primary btn-sm" onclick="addCat()">+</button></div>
    </div></div>
    <div class="card"><div class="card-header"><div class="card-title">Πάροχοι</div></div><div class="card-body">
      <div class="form-group"><label>Κατηγορία</label><select id="prov-cat-sel" onchange="loadProvsForSettings()">${cats.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}</select></div>
      <div class="tag-manager" id="provs-list"></div>
      <div class="add-tag-row"><input type="text" id="new-prov" placeholder="Νέος πάροχος..."><button class="btn btn-primary btn-sm" onclick="addProv()">+</button></div>
    </div></div>
    <div class="card"><div class="card-header"><div class="card-title">Προϊόντα</div></div><div class="card-body">
      <div class="form-group"><label>Πάροχος</label><select id="prod-prov-sel" onchange="loadProdsForSettings()"></select></div>
      <div class="tag-manager" id="prods-list"></div>
      <div class="add-tag-row"><input type="text" id="new-prod" placeholder="Νέο προϊόν..."><button class="btn btn-primary btn-sm" onclick="addProd()">+</button></div>
    </div></div>
  </div>
  <div>
    <div class="card"><div class="card-header"><div class="card-title">Στάτους</div></div><div class="card-body">
      <div class="tag-manager" id="statuses-list">${renderStatusTags(statuses)}</div>
      <div class="add-tag-row" style="flex-wrap:wrap;gap:6px">
        <input type="text" id="new-status" placeholder="Νέο στάτους..." style="flex:1;min-width:120px">
        <select id="new-status-color" style="width:110px;padding:8px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:inherit">
          <option value="gray">⬜ Γκρι</option><option value="blue">🟦 Μπλε</option><option value="green">🟩 Πράσινο</option><option value="yellow">🟨 Κίτρινο</option><option value="red">🟥 Κόκκινο</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="addStatus()">+</button>
      </div>
    </div></div>
    <div class="card"><div class="card-header"><div class="card-title">InfoPortal</div><button class="btn btn-primary btn-sm" onclick="openAddCompany()">+ Εταιρεία</button></div><div class="card-body" id="info-settings">
      ${companies.map((c,i)=>`<div style="background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-weight:700;font-size:13px">${esc(c.name)}</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-primary btn-xs" onclick="openAddPlan('${c.id}','${esc(c.name)}')">+ Πρόγραμμα</button>
            <button class="btn btn-danger btn-xs" onclick="deleteCompany('${c.id}')">Διαγραφή</button>
          </div>
        </div>
        ${c.plans.map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-top:1px solid var(--border)"><span style="font-size:12px;color:var(--text2)">${esc(p.name)} <span style="color:var(--accent)">${esc(p.price)}</span></span><button class="btn btn-danger btn-xs" onclick="deletePlan('${c.id}','${p.id}')">×</button></div>`).join('')}
      </div>`).join('')||'<span style="color:var(--text3);font-size:13px">Δεν υπάρχουν εταιρείες</span>'}
    </div></div>
  </div>
</div>`;
  if(cats.length) loadProvsForSettings();
}

function renderStatusTags(statuses){
  const m={blue:'badge-blue',green:'badge-green',yellow:'badge-yellow',red:'badge-red'};
  return statuses.map(s=>`<div class="tag"><span class="badge ${m[s.color]||'badge-gray'}" style="font-size:10.5px">${esc(s.name)}</span><button class="tag-del" onclick="deleteStatus('${s.id}')">×</button></div>`).join('');
}

window.addCat=async function(){ const n=document.getElementById('new-cat').value.trim(); if(!n) return; await addDoc(collection(db,'categories'),{name:n}); showNotif('Προστέθηκε'); renderSettings(document.getElementById('page-content')); };
window.deleteCat=async function(id){ await deleteDoc(doc(db,'categories',id)); showNotif('Διαγράφηκε'); renderSettings(document.getElementById('page-content')); };
window.addStatus=async function(){ const n=document.getElementById('new-status').value.trim(); const color=document.getElementById('new-status-color').value; if(!n) return; await addDoc(collection(db,'statuses'),{name:n,color}); showNotif('Προστέθηκε'); renderSettings(document.getElementById('page-content')); };
window.deleteStatus=async function(id){ await deleteDoc(doc(db,'statuses',id)); showNotif('Διαγράφηκε'); renderSettings(document.getElementById('page-content')); };

window.loadProvsForSettings=async function(){
  const catId=document.getElementById('prov-cat-sel')?.value; if(!catId) return;
  const provs=await loadProviders(catId);
  document.getElementById('provs-list').innerHTML=provs.map(p=>`<div class="tag">${esc(p.name)}<button class="tag-del" onclick="deleteProv('${p.id}')">×</button></div>`).join('')||'<span style="color:var(--text3);font-size:12px">Κενό</span>';
  const sel=document.getElementById('prod-prov-sel');
  sel.innerHTML=provs.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  loadProdsForSettings();
};
window.addProv=async function(){ const catId=document.getElementById('prov-cat-sel').value; const n=document.getElementById('new-prov').value.trim(); if(!catId||!n) return; await addDoc(collection(db,'providers'),{name:n,categoryId:catId}); document.getElementById('new-prov').value=''; loadProvsForSettings(); showNotif('Προστέθηκε'); };
window.deleteProv=async function(id){ await deleteDoc(doc(db,'providers',id)); loadProvsForSettings(); showNotif('Διαγράφηκε'); };

window.loadProdsForSettings=async function(){
  const provId=document.getElementById('prod-prov-sel')?.value; if(!provId) return;
  const prods=await loadProducts(provId);
  document.getElementById('prods-list').innerHTML=prods.map(p=>`<div class="tag">${esc(p.name)}<button class="tag-del" onclick="deleteProd('${p.id}')">×</button></div>`).join('')||'<span style="color:var(--text3);font-size:12px">Κενό</span>';
};
window.addProd=async function(){ const provId=document.getElementById('prod-prov-sel').value; const n=document.getElementById('new-prod').value.trim(); if(!provId||!n) return; await addDoc(collection(db,'products'),{name:n,providerId:provId}); document.getElementById('new-prod').value=''; loadProdsForSettings(); showNotif('Προστέθηκε'); };
window.deleteProd=async function(id){ await deleteDoc(doc(db,'products',id)); loadProdsForSettings(); showNotif('Διαγράφηκε'); };

window.openAddCompany=function(){
  showModal(`<div class="modal-header"><div class="modal-title">Νέα Εταιρεία</div><button class="modal-close" onclick="closeModal()">×</button></div>
<div class="modal-body"><div class="form-group"><label>Όνομα <span class="req">*</span></label><input id="ic-name" type="text" placeholder="π.χ. Nova"></div></div>
<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Ακύρωση</button><button class="btn btn-primary" onclick="addCompany()">Αποθήκευση</button></div>`);
};
window.addCompany=async function(){ const n=document.getElementById('ic-name').value.trim(); if(!n) return; await addDoc(collection(db,'infoCompanies'),{name:n}); closeModal(); showNotif('Προστέθηκε'); renderSettings(document.getElementById('page-content')); };
window.deleteCompany=async function(id){ if(!confirm('Να διαγραφεί η εταιρεία;')) return; await deleteDoc(doc(db,'infoCompanies',id)); showNotif('Διαγράφηκε'); renderSettings(document.getElementById('page-content')); };
window.openAddPlan=function(compId,compName){
  showModal(`<div class="modal-header"><div class="modal-title">Νέο Πρόγραμμα: ${esc(compName)}</div><button class="modal-close" onclick="closeModal()">×</button></div>
<div class="modal-body">
  <div class="form-group"><label>Πρόγραμμα <span class="req">*</span></label><input id="ip-name" type="text" placeholder="π.χ. Fiber 200"></div>
  <div class="form-group"><label>Τιμή <span class="req">*</span></label><input id="ip-price" type="text" placeholder="π.χ. 24,90€/μήνα"></div>
  <div class="form-group"><label>Δικαιολογητικά (ένα ανά γραμμή, * = υποχρεωτικό)</label><textarea id="ip-docs" placeholder="Ταυτότητα*\nΒεβαίωση ΑΦΜ"></textarea></div>
</div>
<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Ακύρωση</button><button class="btn btn-primary" onclick="addPlan('${compId}')">Αποθήκευση</button></div>`);
};
window.addPlan=async function(compId){ const name=document.getElementById('ip-name').value.trim(); const price=document.getElementById('ip-price').value.trim(); const docs=document.getElementById('ip-docs').value; if(!name||!price) return; await addDoc(collection(db,'infoCompanies',compId,'plans'),{name,price,docs}); closeModal(); showNotif('Προστέθηκε'); renderSettings(document.getElementById('page-content')); };
window.deletePlan=async function(compId,planId){ await deleteDoc(doc(db,'infoCompanies',compId,'plans',planId)); showNotif('Διαγράφηκε'); renderSettings(document.getElementById('page-content')); };

// ── InfoPortal ──
async function renderInfoPortal(c){
  const companies=await loadInfoCompanies();
  c.innerHTML=`
<div style="margin-bottom:20px"><div class="search-bar" style="max-width:380px">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;color:var(--text3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="info-search" placeholder="Αναζήτηση..." oninput="filterInfoPortal()">
</div></div>
<div id="info-panels">${renderInfoPanels(companies)}</div>`;
  window._infoData=companies;
}
function renderInfoPanels(data){
  if(!data.length) return`<div style="text-align:center;padding:60px;color:var(--text3)">Δεν υπάρχουν προγράμματα ακόμα</div>`;
  return data.map(c=>`<div class="info-company">
<div class="company-header">
  <div class="user-av" style="width:38px;height:38px;border-radius:10px;font-size:13px;flex-shrink:0">${esc(c.name.substring(0,2).toUpperCase())}</div>
  <div class="company-name">${esc(c.name)}</div>
  <span style="margin-left:auto;font-size:11px;color:var(--text3)">${c.plans.length} προγράμματα</span>
</div>
<div class="company-body"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
${c.plans.map(pl=>{const docs=(pl.docs||'').split('\n').filter(Boolean);return`<div class="plan-card"><div class="plan-name">${esc(pl.name)}</div><div class="plan-price">${esc(pl.price)}</div>${docs.map(d=>`<div class="plan-doc-item"><span class="${d.includes('*')?'req-doc':''}">${esc(d)}</span></div>`).join('')}</div>`;}).join('')}
</div></div></div>`).join('');
}
window.filterInfoPortal=function(){
  const q=document.getElementById('info-search').value.toLowerCase();
  const filtered=(window._infoData||[]).filter(c=>c.name.toLowerCase().includes(q)||c.plans.some(p=>p.name.toLowerCase().includes(q)));
  document.getElementById('info-panels').innerHTML=renderInfoPanels(filtered);
};

// ── Init ──
// Setup default admin on first run (call from console if needed)
window.setupAdmin = async function(email, password, name){
  try{
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db,'users',cred.user.uid),{name,email,role:'admin',active:true,createdAt:serverTimestamp()});
    // Setup default statuses
    const defaultStatuses=[{name:'Προς Έλεγχο',color:'blue'},{name:'Ενεργοποιημένη',color:'green'},{name:'Εκκρεμότητα',color:'yellow'},{name:'Απορρίφθηκε',color:'red'}];
    for(const s of defaultStatuses) await addDoc(collection(db,'statuses'),s);
    alert('Admin δημιουργήθηκε! Email: '+email);
  } catch(e){ alert('Σφάλμα: '+e.message); }
};
